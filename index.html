<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktivita hliadky</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f2ee; --surface: #fff; --surface2: #edeae3;
      --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.16);
      --text: #1a1814; --muted: #7a746a;
      --accent: #1d5fa8; --accent-light: #e8f0fb; --accent-dark: #0c3d6e;
      --green: #2d6a4f; --green-light: #d8f0e6;
      --red: #c0392b; --red-light: #fde8e6;
      --radius: 10px; --radius-lg: 14px; --nav-h: 62px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: var(--nav-h); }

    /* ── TOPBAR ── */
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.25rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
    .topbar-center { display: flex; align-items: center; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); }
    .topbar-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .topbar-title { font-size: 17px; font-weight: 600; }
    .home-btn { width: 32px; height: 32px; border-radius: 8px; border: .5px solid var(--border-strong); background: var(--surface2); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; text-decoration: none; flex-shrink: 0; }
    .home-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .status-pill { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); background: var(--surface2); border-radius: 20px; padding: 4px 10px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
    .dot.on { background: #3da45a; }

    /* ── NAV ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 30; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 0; flex: 1; }
    .nav-item.active .nav-icon { color: var(--accent); }
    .nav-item.active .nav-label { color: var(--accent); font-weight: 600; }
    .nav-icon { font-size: 20px; color: var(--muted); }
    .nav-label { font-size: 11px; color: var(--muted); }

    /* ── LAYOUT ── */
    .main { max-width: 600px; margin: 0 auto; padding: 1rem; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── GENERIC ── */
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin: 1.25rem 0 8px; }
    .section-label:first-child { margin-top: 0; }

    /* ── NO-SERVICE CARD ── */
    .no-service-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); padding: 1.5rem; text-align: center; margin-bottom: 1rem; }
    .no-service-icon { font-size: 36px; margin-bottom: 12px; }
    .no-service-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .no-service-sub { font-size: 13px; color: var(--muted); }

    /* ── START FORM CARD ── */
    .form-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); padding: 1.25rem; }
    .form-card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 14px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1/-1; }
    .form-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .form-field { height: 42px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface2); outline: none; width: 100%; transition: border-color .15s; }
    .form-field:focus { border-color: var(--accent); background: #fff; }
    select.form-field { -webkit-appearance: none; appearance: none; }
    .submit-btn { width: 100%; height: 46px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: background .15s; }
    .submit-btn:hover { background: var(--accent-dark); }
    .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── WORKER CHIPS (start form) ── */
    .add-worker-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .add-worker-row select { flex: 1; height: 42px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface2); outline: none; -webkit-appearance: none; appearance: none; }
    .btn-add { height: 42px; padding: 0 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

    /* ── ACTIVE SERVICE CARD ── */
    .active-service-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); overflow: hidden; margin-bottom: 1rem; }
    .active-service-header { padding: 16px; border-bottom: .5px solid var(--border); display: flex; align-items: center; gap: 14px; }
    .active-worker-chip { width: 52px; height: 52px; border-radius: 12px; background: var(--green-light); color: var(--green); font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .active-service-info .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--green); margin-bottom: 2px; }
    .active-service-info .title { font-size: 18px; font-weight: 600; }
    .active-service-info .since { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .active-footer { display: flex; gap: 8px; padding: 12px 15px; background: var(--surface2); border-top: .5px solid var(--border); }
    .add-worker-btn { flex: 1; height: 42px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .add-worker-btn:hover { background: var(--accent-dark); }
    .end-service-btn { height: 42px; padding: 0 16px; background: var(--red-light); color: var(--red); border: 1px solid rgba(192,57,43,0.2); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background .15s; }
    .end-service-btn:hover { background: #fcd5d0; }

    /* ── ACTIVITY GRID TABLE ── */
    .act-grid-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 15px 12px; }
    .act-grid { border-collapse: collapse; min-width: 100%; }
    .act-grid th, .act-grid td { border-bottom: .5px solid var(--border); white-space: nowrap; }
    .act-grid tbody tr:last-child td { border-bottom: none; }
    .act-name-th { padding: 10px 12px 10px 0; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); text-align: left; min-width: 172px; background: var(--surface); position: sticky; left: -15px; z-index: 2; border-right: .5px solid var(--border); }
    .worker-th { padding: 8px 10px; background: var(--surface2); text-align: center; min-width: 110px; border-right: .5px solid var(--border); }
    .worker-th:last-child { border-right: none; }
    .worker-th-inner { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .worker-th-label { font-size: 14px; font-weight: 700; color: var(--accent); }
    .btn-remove-worker { width: 20px; height: 20px; border-radius: 5px; border: .5px solid rgba(192,57,43,0.3); background: none; color: var(--red); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; }
    .act-name-td { padding: 7px 12px 7px 0; font-size: 13px; color: var(--text); background: var(--surface); position: sticky; left: -15px; z-index: 1; display: flex; align-items: center; gap: 7px; border-right: .5px solid var(--border); }
    .act-icon { font-size: 15px; flex-shrink: 0; }
    .act-cell { padding: 5px 8px; text-align: center; border-right: .5px solid var(--border); }
    .act-cell:last-child { border-right: none; }
    .act-cell.total-td { font-size: 14px; font-weight: 700; color: var(--accent); }
    .act-name-td.total-td { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .cell-counter { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .btn-minus { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid rgba(192,57,43,0.25); background: none; color: var(--red); font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; line-height: 1; flex-shrink: 0; }
    .btn-minus:hover { background: var(--red-light); }
    .btn-minus:disabled { opacity: 0.25; cursor: default; }
    .act-num { width: 26px; text-align: center; font-size: 14px; font-weight: 700; color: var(--text); }
    .act-num.nz { color: var(--accent); }
    .btn-plus { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--accent); color: #fff; font-size: 18px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; line-height: 1; flex-shrink: 0; box-shadow: 0 2px 6px rgba(29,95,168,0.18); }
    .btn-plus:hover { background: var(--accent-dark); }
    .btn-plus:active { transform: scale(.93); }

    /* ── ADD WORKER MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 1.25rem; width: 100%; max-width: 600px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close { background: var(--surface2); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }

    /* ── ZÁZNAMY ── */
    .date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
    .date-row input[type="date"] { flex: 1; height: 38px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; -webkit-appearance: none; }
    .today-btn { height: 38px; padding: 0 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
    .today-btn:hover { border-color: var(--accent); color: var(--accent); }
    .zaz-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    .zaz-header { display: flex; align-items: center; gap: 12px; padding: 13px 15px; cursor: pointer; }
    .zaz-header:hover { background: #fafaf8; }
    .zaz-chip { width: 44px; height: 44px; border-radius: 10px; background: var(--surface2); color: var(--muted); font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .zaz-chip.active { background: var(--green-light); color: var(--green); }
    .zaz-info { flex: 1; min-width: 0; }
    .zaz-title { font-size: 15px; font-weight: 500; }
    .zaz-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .zaz-total { font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .svc-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
    .svc-badge.active { background: var(--green-light); color: var(--green); }
    .svc-badge.done   { background: var(--surface2); color: var(--muted); }
    .zaz-body { border-top: .5px solid var(--border); display: none; }
    .zaz-body.open { display: block; }
    .zaz-worker-row { padding: 10px 15px; border-bottom: .5px solid var(--border); }
    .zaz-worker-row:last-child { border-bottom: none; }
    .zaz-worker-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .zaz-acts { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px; }
    .zaz-act-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .zaz-act-item span { font-weight: 600; color: var(--text); margin-left: auto; }
    .zaz-act-item.nz { color: var(--text); }
    .zaz-act-item.nz span { color: var(--accent); }
    .del-btn { height: 28px; padding: 0 12px; background: none; border: .5px solid rgba(192,57,43,0.25); border-radius: 6px; color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; margin: 10px 15px; }

    /* ── STATS ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .kpi-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); padding: 14px; text-align: center; }
    .kpi-num { font-size: 26px; font-weight: 700; line-height: 1; color: var(--accent); }
    .kpi-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .stat-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); padding: 16px; margin-bottom: 10px; }
    .stat-card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 12px; }
    .br { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .br:last-child { margin-bottom: 0; }
    .br-label { font-size: 13px; min-width: 50px; flex-shrink: 0; }
    .br-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
    .br-bar { height: 100%; border-radius: 4px; transition: width .4s; }
    .br-count { font-size: 13px; font-weight: 600; min-width: 80px; text-align: right; }
    .period-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .period-btn { height: 30px; padding: 0 14px; border-radius: 20px; border: 1px solid var(--border-strong); background: var(--surface); font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--muted); cursor: pointer; transition: all .15s; }
    .period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chart-wrap { position: relative; height: 180px; margin-bottom: 4px; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }

    @media (max-width: 480px) {
      .active-footer { flex-direction: column; }
      .add-worker-btn { flex: none; width: 100%; }
      .end-service-btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a class="home-btn" href="https://msprk.github.io" title="Dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </a>
  <div class="topbar-center">
    <div class="topbar-icon">📊</div>
    <span class="topbar-title">Aktivita hliadky</span>
  </div>
  <div class="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Pripájanie...</span>
  </div>
</nav>

<div class="main">

  <!-- ── HLIADKA TAB ── -->
  <div class="tab-panel active" id="tab-hliadka">
    <div id="hliadka-content"></div>
  </div>

  <!-- ── ZÁZNAMY TAB ── -->
  <div class="tab-panel" id="tab-zaznamy">
    <div class="date-row">
      <input type="date" id="filter-date" oninput="window.renderZaznamy()"/>
      <button class="today-btn" onclick="resetDate()">Dnes</button>
    </div>
    <div id="zaznamy-list"></div>
  </div>

  <!-- ── ŠTATISTIKY TAB ── -->
  <div class="tab-panel" id="tab-stats">
    <div class="period-row">
      <button class="period-btn active" data-p="week"  onclick="setPeriod('week')">Týždeň</button>
      <button class="period-btn"        data-p="month" onclick="setPeriod('month')">Mesiac</button>
      <button class="period-btn"        data-p="all"   onclick="setPeriod('all')">Všetko</button>
    </div>
    <div id="stats-content"></div>
  </div>

</div>

<!-- MODAL: pridať pracovníka počas hliadky -->
<div class="modal-overlay hidden" id="modal-worker">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Pridať pracovníka</span>
      <button class="modal-close" onclick="closeWorkerModal()">×</button>
    </div>
    <div class="add-worker-row" style="margin-bottom:0">
      <select id="modal-worker-select" class="form-field" style="height:42px;flex:1">
        <option value="">— Vybrať pracovníka —</option>
      </select>
      <button class="btn-add" onclick="addActiveWorker()">Pridať</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" id="nav-hliadka" onclick="switchTab('hliadka')">
    <span class="nav-icon" id="hliadka-icon">🚶</span>
    <span class="nav-label">Hliadka</span>
  </div>
  <div class="nav-item" id="nav-zaznamy" onclick="switchTab('zaznamy')">
    <span class="nav-icon">🗂️</span>
    <span class="nav-label">Záznamy</span>
  </div>
  <div class="nav-item" id="nav-stats" onclick="switchTab('stats')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Štatistiky</span>
  </div>
</nav>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDOYPIXjbW3mrFpospLjTbt6ui4I318sg8",
    authDomain:        "msprk-app.firebaseapp.com",
    databaseURL:       "https://msprk-app-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "msprk-app",
    storageBucket:     "msprk-app.firebasestorage.app",
    messagingSenderId: "544350754193",
    appId:             "1:544350754193:web:acb050a43126437790f630"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  onAuthStateChanged(auth, user => { if (!user) window.location.href = "https://msprk.github.io/"; });

  const db    = getDatabase(app);
  const dbRef = ref(db, "aktivity/zaznamy");

  // ── CONSTANTS ──
  const ACTIVITIES = [
    { id: "preverenie",   label: "Preverenie osoby",    icon: "🔍" },
    { id: "pomoc",        label: "Pomoc občanovi",       icon: "🤝" },
    { id: "telefon159",   label: "Telefonát 159",        icon: "📞" },
    { id: "predvedenie",  label: "Predvedenie osoby",    icon: "👮" },
    { id: "pokuta",       label: "Bloková pokuta",        icon: "📋" },
    { id: "priestupok",   label: "Priestupkové konanie", icon: "⚖️" },
    { id: "hliadkovanie", label: "Hliadkovanie",         icon: "🚶" },
    { id: "ine",          label: "Iné",                  icon: "📌" },
  ];
  const WORKERS = Array.from({length:39},(_,i)=>(i+1).toString().padStart(3,"0"));

  // ── STATE ──
  let allData    = {};
  let activeId   = null;
  let openZazId  = null;
  let statPeriod = "week";
  let statChart  = null;
  window._startWorkers = [];

  // ── HELPERS ──
  function setStatus(on) {
    document.getElementById("status-dot").className = "dot"+(on?" on":"");
    document.getElementById("status-text").textContent = on ? "Online" : "Offline";
  }
  function todayStr() { return new Date().toISOString().split("T")[0]; }
  function emptyWorkerCounts() { const o={}; ACTIVITIES.forEach(a=>o[a.id]=0); return o; }
  function workerTotal(counts) { return ACTIVITIES.reduce((s,a)=>s+(counts[a.id]||0),0); }
  function shiftTotal(z) { return Object.values(z.workers||{}).reduce((s,w)=>s+workerTotal(w),0); }

  // ── FIREBASE ──
  onValue(dbRef, snap => {
    allData = snap.val() || {};
    setStatus(true);
    const actEntry = Object.entries(allData).find(([,v])=>v.status==="active");
    activeId = actEntry ? actEntry[0] : null;
    document.getElementById("hliadka-icon").textContent = activeId ? "🟢" : "🚶";
    renderHliadka();
    window.renderZaznamy();
    window.renderStats();
  }, () => setStatus(false));

  // ── TAB SWITCH ──
  window.switchTab = function(tab) {
    ["hliadka","zaznamy","stats"].forEach(t => {
      document.getElementById("tab-"+t).classList.toggle("active", t===tab);
      document.getElementById("nav-"+t).classList.toggle("active", t===tab);
    });
    if (tab==="stats")   window.renderStats();
    if (tab==="zaznamy") window.renderZaznamy();
  };

  // ── HLIADKA TAB ──
  function renderHliadka() {
    const el = document.getElementById("hliadka-content");
    if (activeId && allData[activeId]) {
      renderActiveShift(el);
    } else {
      renderStartPanel(el);
    }
  }

  // ── START PANEL ──
  function renderStartPanel(el) {
    el.innerHTML = `
      <div class="no-service-card">
        <div class="no-service-icon">🚶</div>
        <div class="no-service-title">Žiadna aktívna hliadka</div>
        <div class="no-service-sub">Momentálne nie je spustená žiadna hliadka.</div>
      </div>
      <div class="form-card">
        <div class="form-card-title">Začať novú hliadku</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Dátum</label>
            <input class="form-field" type="date" id="f-date" value="${todayStr()}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Hliadka</label>
            <select class="form-field" id="f-shift">
              <option value="">—</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
        </div>
        <div style="font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px">Pracovníci</div>
        <div class="add-worker-row">
          <select id="worker-select-start">
            <option value="">— Vybrať pracovníka —</option>
            ${WORKERS.map(w=>`<option value="${w}">${w}</option>`).join("")}
          </select>
          <button class="btn-add" onclick="addStartWorker()">+ Pridať</button>
        </div>
        <div id="start-workers-chips" style="display:flex;flex-wrap:wrap;gap:6px;min-height:22px;margin-bottom:14px"></div>
        <button class="submit-btn" id="start-btn" onclick="startHliadka()">Začať hliadku</button>
      </div>`;
    window._startWorkers = [];
    renderStartChips();
  }

  function renderStartChips() {
    const el = document.getElementById("start-workers-chips");
    if (!el) return;
    if (!window._startWorkers.length) {
      el.innerHTML = `<span style="font-size:12px;color:var(--muted)">Žiadni pracovníci</span>`;
      return;
    }
    el.innerHTML = window._startWorkers.map(w => `
      <div style="display:flex;align-items:center;gap:5px;background:var(--accent-light);border-radius:20px;padding:4px 10px 4px 12px;font-size:13px;font-weight:600;color:var(--accent)">
        ${w}
        <button onclick="removeStartWorker('${w}')" style="width:18px;height:18px;border-radius:50%;border:none;background:rgba(29,95,168,0.15);color:var(--accent);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1">×</button>
      </div>`).join("");
  }

  window.addStartWorker = function() {
    const sel = document.getElementById("worker-select-start");
    const w = sel.value;
    if (!w) return;
    if (window._startWorkers.includes(w)) { alert(`Pracovník ${w} je už pridaný.`); return; }
    window._startWorkers.push(w);
    sel.value = "";
    renderStartChips();
  };

  window.removeStartWorker = function(w) {
    window._startWorkers = window._startWorkers.filter(x=>x!==w);
    renderStartChips();
  };

  window.startHliadka = async function() {
    const date  = document.getElementById("f-date")?.value;
    const shift = document.getElementById("f-shift")?.value;
    if (!date)  { alert("Vyplňte dátum."); return; }
    if (!shift) { alert("Vyberte hliadku."); return; }
    if (!window._startWorkers?.length) { alert("Pridajte aspoň jedného pracovníka."); return; }
    const btn = document.getElementById("start-btn");
    btn.disabled = true; btn.textContent = "Ukladanie...";
    const workers = {};
    window._startWorkers.forEach(w => { workers[w] = emptyWorkerCounts(); });
    await push(dbRef, { date, shift, ts: Date.now(), status: "active", workers });
    btn.disabled = false; btn.textContent = "Začať hliadku";
  };

  // ── ACTIVE SHIFT ──
  function renderActiveShift(el) {
    const s = allData[activeId];
    const workers = s.workers || {};
    const keys = Object.keys(workers);
    const total = shiftTotal(s);
    const wCount = keys.length;

    // Worker modal options
    const usedWorkers = new Set(keys);
    const availWorkers = WORKERS.filter(w=>!usedWorkers.has(w));
    const modalSel = document.getElementById("modal-worker-select");
    if (modalSel) {
      modalSel.innerHTML = `<option value="">— Vybrať pracovníka —</option>` +
        availWorkers.map(w=>`<option value="${w}">${w}</option>`).join("");
    }

    // Matrix grid
    let grid = "";
    if (keys.length) {
      const workerCols = keys.map(w => `
        <th class="worker-th">
          <div class="worker-th-inner">
            <div class="worker-th-label">${w}</div>
            <button class="btn-remove-worker" onclick="removeActiveWorker('${w}')">×</button>
          </div>
        </th>`).join("");

      const actRows = ACTIVITIES.map(a => {
        const cells = keys.map(w => {
          const cnt = (workers[w]?.[a.id])||0;
          return `<td class="act-cell">
            <div class="cell-counter">
              <button class="btn-minus" onclick="decActive('${w}','${a.id}')" ${cnt===0?"disabled":""}>−</button>
              <div class="act-num${cnt>0?" nz":""}">${cnt}</div>
              <button class="btn-plus" onclick="incActive('${w}','${a.id}')">+</button>
            </div>
          </td>`;
        }).join("");
        return `<tr>
          <td><div class="act-name-td"><span class="act-icon">${a.icon}</span>${a.label}</div></td>
          ${cells}
        </tr>`;
      }).join("");

      const totalRow = `<tr style="background:var(--surface2)">
        <td><div class="act-name-td total-td">Celkom</div></td>
        ${keys.map(w=>`<td class="act-cell total-td">${workerTotal(workers[w]||{})}</td>`).join("")}
      </tr>`;

      grid = `<div class="act-grid-wrap">
        <table class="act-grid">
          <thead><tr>
            <th class="act-name-th">Aktivita</th>
            ${workerCols}
          </tr></thead>
          <tbody>${actRows}</tbody>
          <tfoot>${totalRow}</tfoot>
        </table>
      </div>`;
    } else {
      grid = `<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:13px">Pridajte pracovníkov hliadky pomocou tlačidla nižšie.</div>`;
    }

    el.innerHTML = `
      <div class="active-service-card">
        <div class="active-service-header">
          <div class="active-worker-chip">${s.shift||"?"}</div>
          <div class="active-service-info">
            <div class="label">Aktívna hliadka</div>
            <div class="title">Hliadka ${s.shift||"?"} · ${s.date||""}</div>
            <div class="since">${wCount} pracovník${wCount===1?"":wCount<5?"íci":"ov"} · ${total} aktivít</div>
          </div>
        </div>
        ${grid}
        <div class="active-footer">
          <button class="add-worker-btn" onclick="openWorkerModal()">+ Pridať pracovníka</button>
          <button class="end-service-btn" onclick="closeHliadka()">Ukončiť hliadku</button>
        </div>
      </div>`;
  }

  // ── WORKER MODAL ──
  window.openWorkerModal = function() {
    const usedWorkers = new Set(Object.keys(allData[activeId]?.workers||{}));
    const availWorkers = WORKERS.filter(w=>!usedWorkers.has(w));
    document.getElementById("modal-worker-select").innerHTML =
      `<option value="">— Vybrať pracovníka —</option>` +
      availWorkers.map(w=>`<option value="${w}">${w}</option>`).join("");
    document.getElementById("modal-worker").classList.remove("hidden");
  };
  window.closeWorkerModal = () => document.getElementById("modal-worker").classList.add("hidden");

  window.addActiveWorker = async function() {
    const sel = document.getElementById("modal-worker-select");
    const w = sel.value;
    if (!w || !activeId) return;
    if (!allData[activeId].workers) allData[activeId].workers = {};
    allData[activeId].workers[w] = emptyWorkerCounts();
    closeWorkerModal();
    renderHliadka();
    await set(ref(db, `aktivity/zaznamy/${activeId}/workers/${w}`), emptyWorkerCounts());
  };

  window.removeActiveWorker = async function(w) {
    if (!activeId) return;
    if (!confirm(`Odstrániť pracovníka ${w} z hliadky?`)) return;
    delete allData[activeId].workers[w];
    renderHliadka();
    await remove(ref(db, `aktivity/zaznamy/${activeId}/workers/${w}`));
  };

  window.incActive = async function(w, actId) {
    if (!activeId) return;
    const current = (allData[activeId]?.workers?.[w]?.[actId])||0;
    const next = current + 1;
    allData[activeId].workers[w][actId] = next;
    renderHliadka();
    await set(ref(db, `aktivity/zaznamy/${activeId}/workers/${w}/${actId}`), next);
  };

  window.decActive = async function(w, actId) {
    if (!activeId) return;
    const current = (allData[activeId]?.workers?.[w]?.[actId])||0;
    if (current <= 0) return;
    const next = current - 1;
    allData[activeId].workers[w][actId] = next;
    renderHliadka();
    await set(ref(db, `aktivity/zaznamy/${activeId}/workers/${w}/${actId}`), next);
  };

  window.closeHliadka = async function() {
    if (!activeId) return;
    if (!confirm("Ukončiť aktívnu hliadku?")) return;
    await update(ref(db, `aktivity/zaznamy/${activeId}`), { status: "done" });
  };

  // ── ZÁZNAMY ──
  window.renderZaznamy = function() {
    const fDate = document.getElementById("filter-date")?.value || "";
    const entries = Object.entries(allData)
      .map(([id,v])=>({id,...v}))
      .filter(z => !fDate || z.date === fDate)
      .sort((a,b)=>(b.date||"").localeCompare(a.date||"") || (b.ts||0)-(a.ts||0));

    const el = document.getElementById("zaznamy-list");
    if (!entries.length) {
      el.innerHTML = `<div class="empty">Žiadne záznamy${fDate?" pre vybraný dátum":""}.</div>`;
      return;
    }
    el.innerHTML = entries.map(z => {
      const isActive = z.status === "active";
      const total  = shiftTotal(z);
      const wCount = Object.keys(z.workers||{}).length;
      const isOpen = openZazId === z.id;
      return `
      <div class="zaz-card">
        <div class="zaz-header" onclick="toggleZaz('${z.id}')">
          <div class="zaz-chip${isActive?" active":""}">${z.shift||"?"}</div>
          <div class="zaz-info">
            <div class="zaz-title">Hliadka ${z.shift||"?"} · ${z.date||""}</div>
            <div class="zaz-meta">${wCount} pracovník${wCount===1?"":wCount<5?"íci":"ov"} · ${total} aktivít</div>
          </div>
          <span class="svc-badge ${isActive?"active":"done"}">${isActive?"Aktívna":"Ukončená"}</span>
        </div>
        <div class="zaz-body${isOpen?" open":""}">
          ${Object.entries(z.workers||{}).sort((a,b)=>workerTotal(b[1])-workerTotal(a[1])).map(([w,counts])=>`
          <div class="zaz-worker-row">
            <div class="zaz-worker-name">Pracovník ${w} · <span style="color:var(--accent)">${workerTotal(counts)} aktivít</span></div>
            <div class="zaz-acts">
              ${ACTIVITIES.map(a=>{
                const v=counts[a.id]||0;
                return `<div class="zaz-act-item${v>0?" nz":""}">
                  <span>${a.icon}</span> ${a.label} <span>${v}</span>
                </div>`;
              }).join("")}
            </div>
          </div>`).join("")}
          <button class="del-btn" onclick="deleteZaz('${z.id}')">Vymazať záznam</button>
        </div>
      </div>`;
    }).join("");
  };

  window.toggleZaz = id => { openZazId = openZazId===id?null:id; window.renderZaznamy(); };
  window.deleteZaz = id => { if (confirm("Vymazať tento záznam?")) remove(ref(db,"aktivity/zaznamy/"+id)); };
  window.resetDate = () => { document.getElementById("filter-date").value=todayStr(); window.renderZaznamy(); };

  // ── ŠTATISTIKY ──
  window.setPeriod = function(p) {
    statPeriod = p;
    document.querySelectorAll(".period-btn").forEach(b=>b.classList.toggle("active",b.dataset.p===p));
    window.renderStats();
  };

  window.renderStats = function() {
    const now    = new Date();
    const cutoff = statPeriod==="week"  ? new Date(now-7*86400000).toISOString().split("T")[0]
                 : statPeriod==="month" ? new Date(now-30*86400000).toISOString().split("T")[0]
                 : "0000-00-00";

    const entries = Object.values(allData).filter(z=>(z.date||"")>=cutoff && z.status!=="active");

    const totalSessions = entries.length;
    const totalActs     = entries.reduce((s,z)=>s+shiftTotal(z),0);
    const totalWorkers  = new Set(entries.flatMap(z=>Object.keys(z.workers||{}))).size;

    const workerMap = {};
    entries.forEach(z => Object.entries(z.workers||{}).forEach(([w,counts]) => {
      if (!workerMap[w]) workerMap[w]={acts:0};
      workerMap[w].acts += workerTotal(counts);
    }));
    const topWorkers = Object.entries(workerMap).sort((a,b)=>b[1].acts-a[1].acts).slice(0,10);
    const maxW = Math.max(...topWorkers.map(([,v])=>v.acts), 1);

    const actMap = {};
    ACTIVITIES.forEach(a=>actMap[a.id]=0);
    entries.forEach(z=>Object.values(z.workers||{}).forEach(counts=>ACTIVITIES.forEach(a=>actMap[a.id]+=(counts[a.id]||0))));
    const maxA = Math.max(...Object.values(actMap), 1);

    const shiftColors = {"A":"#1d5fa8","B":"#2d6a4f","C":"#b45309","D":"#c0392b"};
    const shiftData = ["A","B","C","D"].map(sh=>({
      sh,
      acts: entries.filter(z=>z.shift===sh).reduce((s,z)=>s+shiftTotal(z),0),
      sess: entries.filter(z=>z.shift===sh).length
    }));
    const maxSh = Math.max(...shiftData.map(d=>d.acts), 1);

    const el = document.getElementById("stats-content");
    if (!el) return;
    el.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-num">${totalActs}</div><div class="kpi-label">Aktivít celkom</div></div>
        <div class="kpi-card"><div class="kpi-num">${totalSessions}</div><div class="kpi-label">Záznamy</div></div>
        <div class="kpi-card"><div class="kpi-num">${totalWorkers}</div><div class="kpi-label">Pracovníci</div></div>
      </div>
      ${totalSessions===0 ? `<div class="empty">Žiadne dáta za vybrané obdobie.</div>` : `
      <div class="stat-card">
        <div class="stat-card-title">Podľa pracovníka</div>
        ${topWorkers.map(([w,v])=>`
          <div class="br">
            <div class="br-label">${w}</div>
            <div class="br-wrap"><div class="br-bar" style="width:${Math.round(v.acts/maxW*100)}%;background:var(--accent)"></div></div>
            <div class="br-count"><span style="font-weight:700;color:var(--accent)">${v.acts}</span> <span style="font-size:11px;color:var(--muted)">aktiv.</span></div>
          </div>`).join("")}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Podľa hliadky</div>
        ${shiftData.map(({sh,acts,sess})=>`
          <div class="br">
            <div class="br-label">Hliadka ${sh}</div>
            <div class="br-wrap"><div class="br-bar" style="width:${Math.round(acts/maxSh*100)}%;background:${shiftColors[sh]}"></div></div>
            <div class="br-count">
              <span style="font-weight:700">${acts}</span> <span style="font-size:11px;color:var(--muted)">aktiv.</span>
              &nbsp;·&nbsp;<span style="font-size:11px;color:var(--muted)">${sess} záz.</span>
            </div>
          </div>`).join("")}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Podľa typu aktivity</div>
        <div class="chart-wrap"><canvas id="act-chart"></canvas></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Typy aktivít — detail</div>
        ${ACTIVITIES.map(a=>`
          <div class="br">
            <div class="br-label" style="min-width:160px;font-size:12px">${a.icon} ${a.label}</div>
            <div class="br-wrap"><div class="br-bar" style="width:${Math.round(actMap[a.id]/maxA*100)}%;background:var(--accent)"></div></div>
            <div class="br-count" style="font-weight:700;color:var(--accent)">${actMap[a.id]}</div>
          </div>`).join("")}
      </div>`}
    `;

    if (totalSessions > 0) {
      if (statChart) { statChart.destroy(); statChart = null; }
      const ctx = document.getElementById("act-chart");
      if (ctx) {
        statChart = new Chart(ctx, {
          type: "bar",
          data: {
            labels: ACTIVITIES.map(a=>a.label),
            datasets: [{ data: ACTIVITIES.map(a=>actMap[a.id]), backgroundColor:"rgba(29,95,168,0.18)", borderColor:"rgba(29,95,168,0.7)", borderWidth:1.5, borderRadius:6 }]
          },
          options: {
            responsive:true, maintainAspectRatio:true,
            plugins:{ legend:{display:false} },
            scales:{
              x:{ grid:{display:false}, ticks:{font:{family:"DM Sans",size:10},color:"#7a746a",maxRotation:35} },
              y:{ grid:{color:"rgba(0,0,0,0.05)"}, ticks:{font:{family:"DM Sans",size:11},color:"#7a746a",precision:0}, beginAtZero:true }
            }
          }
        });
      }
    }
  };
</script>
</body>
</html>
