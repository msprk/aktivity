<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktivita hliadky</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f2ee; --surface: #fff; --surface2: #edeae3;
      --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.16);
      --text: #1a1814; --muted: #7a746a;
      --accent: #1d5fa8; --accent-light: #e8f0fb; --accent-dark: #0c3d6e;
      --green: #2d6a4f; --green-light: #d8f0e6;
      --red: #c0392b; --red-light: #fde8e6;
      --amber: #b45309;
      --radius: 10px; --radius-lg: 14px; --nav-h: 62px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: var(--nav-h); }

    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.25rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .topbar-title { font-size: 17px; font-weight: 600; }
    .home-btn { width: 32px; height: 32px; border-radius: 8px; border: .5px solid var(--border-strong); background: var(--surface2); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; text-decoration: none; flex-shrink: 0; }
    .home-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .status-pill { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); background: var(--surface2); border-radius: 20px; padding: 4px 10px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
    .dot.on { background: #3da45a; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 30; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 0; flex: 1; }
    .nav-item.active .nav-icon { color: var(--accent); }
    .nav-item.active .nav-label { color: var(--accent); font-weight: 600; }
    .nav-icon { font-size: 20px; color: var(--muted); }
    .nav-label { font-size: 11px; color: var(--muted); }

    .main { max-width: 600px; margin: 0 auto; padding: 1rem; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* FORM */
    .card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); padding: 16px; margin-bottom: 10px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1/-1; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .form-field { height: 40px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 0 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; width: 100%; }
    .form-field:focus { border-color: var(--accent); }
    select.form-field { -webkit-appearance: none; appearance: none; }
    .btn-primary { width: 100%; height: 46px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }

    /* ADD WORKER ROW */
    .add-worker-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-worker-row select { flex: 1; height: 40px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; -webkit-appearance: none; appearance: none; }
    .btn-add { height: 40px; padding: 0 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

    /* ACTIVITY GRID TABLE */
    .act-grid-wrap { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); overflow-x: auto; margin-bottom: 10px; -webkit-overflow-scrolling: touch; }
    .act-grid { border-collapse: collapse; min-width: 100%; }
    .act-grid th, .act-grid td { border-bottom: .5px solid var(--border); white-space: nowrap; }
    .act-grid tbody tr:last-child td { border-bottom: none; }
    .act-name-th { padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); text-align: left; min-width: 160px; background: var(--surface); position: sticky; left: 0; z-index: 2; }
    .worker-th { padding: 8px 10px; background: var(--surface2); text-align: center; min-width: 110px; }
    .worker-th-inner { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .worker-th-label { font-size: 14px; font-weight: 700; color: var(--accent); }
    .btn-remove-worker { width: 24px; height: 24px; border-radius: 6px; border: .5px solid rgba(192,57,43,0.25); background: none; color: var(--red); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .act-name-td { padding: 8px 14px; font-size: 13px; color: var(--text); background: var(--surface); position: sticky; left: 0; z-index: 1; display: flex; align-items: center; gap: 7px; }
    .act-icon { font-size: 15px; }
    .act-cell { padding: 6px 8px; text-align: center; }
    .act-cell.total-td { font-size: 14px; font-weight: 700; color: var(--accent); }
    .act-name-td.total-td { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .cell-counter { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .btn-minus { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid rgba(192,57,43,0.25); background: none; color: var(--red); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; line-height: 1; }
    .btn-minus:hover { background: var(--red-light); }
    .btn-minus:disabled { opacity: 0.25; cursor: default; }
    .act-num { width: 28px; text-align: center; font-size: 14px; font-weight: 700; color: var(--text); }
    .act-num.nz { color: var(--accent); }
    .btn-plus { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--accent); color: #fff; font-size: 17px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; line-height: 1; box-shadow: 0 2px 6px rgba(29,95,168,0.18); }
    .btn-plus:hover { background: var(--accent-dark); }
    .btn-plus:active { transform: scale(.93); }

    /* SECTION LABEL */
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin: 1.25rem 0 8px; }
    .section-label:first-child { margin-top: 0; }

    /* ZÁZNAMY */
    .zaz-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    .zaz-header { display: flex; align-items: center; gap: 12px; padding: 13px 15px; cursor: pointer; }
    .zaz-header:hover { background: #fafaf8; }
    .zaz-chip { width: 42px; height: 42px; border-radius: 10px; background: var(--surface2); color: var(--muted); font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .zaz-info { flex: 1; min-width: 0; }
    .zaz-title { font-size: 15px; font-weight: 500; }
    .zaz-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .zaz-total { font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .zaz-body  { border-top: .5px solid var(--border); display: none; }
    .zaz-body.open { display: block; }

    .zaz-worker-row { padding: 10px 15px; border-bottom: .5px solid var(--border); }
    .zaz-worker-row:last-child { border-bottom: none; }
    .zaz-worker-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .zaz-acts { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px; }
    .zaz-act-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .zaz-act-item span { font-weight: 600; color: var(--text); margin-left: auto; }
    .zaz-act-item.nz { color: var(--text); }
    .zaz-act-item.nz span { color: var(--accent); }

    /* DATE FILTER */
    .date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
    .date-row input[type="date"] { flex: 1; height: 38px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); outline: none; -webkit-appearance: none; }
    .today-btn { height: 38px; padding: 0 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
    .today-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* STATS */
    .kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .kpi-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); padding: 14px; text-align: center; }
    .kpi-num { font-size: 26px; font-weight: 700; line-height: 1; color: var(--accent); }
    .kpi-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .stat-card { background: var(--surface); border-radius: var(--radius-lg); border: .5px solid var(--border); padding: 16px; margin-bottom: 10px; }
    .stat-card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 12px; }
    .br { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .br:last-child { margin-bottom: 0; }
    .br-label { font-size: 13px; min-width: 50px; flex-shrink: 0; }
    .br-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
    .br-bar { height: 100%; border-radius: 4px; transition: width .4s; }
    .br-count { font-size: 13px; font-weight: 600; min-width: 80px; text-align: right; }
    .period-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .period-btn { height: 30px; padding: 0 14px; border-radius: 20px; border: 1px solid var(--border-strong); background: var(--surface); font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--muted); cursor: pointer; transition: all .15s; }
    .period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chart-wrap { position: relative; height: 180px; margin-bottom: 4px; }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
    .del-btn { height: 28px; padding: 0 12px; background: none; border: .5px solid rgba(192,57,43,0.25); border-radius: 6px; color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; margin: 10px 15px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon">📊</div>
    <span class="topbar-title">Aktivita hliadky</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="status-pill"><div class="dot" id="status-dot"></div><span id="status-text">...</span></div>
    <a href="https://msprk.github.io/" class="home-btn" title="Domov">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </a>
  </div>
</div>

<div class="main">
  <!-- ZÁZNAM TAB -->
  <div class="tab-panel active" id="tab-zaznam">

    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:14px">Nový záznam hliadky</div>
      <div class="form-row">
        <div class="form-group">
          <span class="form-label">Dátum</span>
          <input class="form-field" type="date" id="f-date"/>
        </div>
        <div class="form-group">
          <span class="form-label">Hliadka</span>
          <select class="form-field" id="f-shift">
            <option value="">— Vybrať —</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section-label">Pracovníci</div>
    <div class="add-worker-row">
      <select id="worker-select">
        <option value="">— Vybrať pracovníka —</option>
      </select>
      <button class="btn-add" onclick="addWorker()">+ Pridať</button>
    </div>
    <div id="workers-list"></div>

    <button class="btn-primary" id="save-btn" onclick="saveZaznam()" style="margin-top:4px">Uložiť záznam</button>
  </div>

  <!-- ZÁZNAMY TAB -->
  <div class="tab-panel" id="tab-zaznamy">
    <div class="date-row">
      <input type="date" id="filter-date" oninput="window.renderZaznamy()"/>
      <button class="today-btn" onclick="resetDate()">Dnes</button>
    </div>
    <div id="zaznamy-list"></div>
  </div>

  <!-- ŠTATISTIKY TAB -->
  <div class="tab-panel" id="tab-stats">
    <div class="period-row">
      <button class="period-btn active" data-p="week"  onclick="setPeriod('week')">Týždeň</button>
      <button class="period-btn"        data-p="month" onclick="setPeriod('month')">Mesiac</button>
      <button class="period-btn"        data-p="all"   onclick="setPeriod('all')">Všetko</button>
    </div>
    <div id="stats-content"></div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" id="nav-zaznam" onclick="switchTab('zaznam')">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Záznam</span>
  </div>
  <div class="nav-item" id="nav-zaznamy" onclick="switchTab('zaznamy')">
    <span class="nav-icon">🗂️</span>
    <span class="nav-label">Záznamy</span>
  </div>
  <div class="nav-item" id="nav-stats" onclick="switchTab('stats')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Štatistiky</span>
  </div>
</nav>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDOYPIXjbW3mrFpospLjTbt6ui4I318sg8",
    authDomain:        "msprk-app.firebaseapp.com",
    databaseURL:       "https://msprk-app-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "msprk-app",
    storageBucket:     "msprk-app.firebasestorage.app",
    messagingSenderId: "544350754193",
    appId:             "1:544350754193:web:acb050a43126437790f630"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  onAuthStateChanged(auth, user => { if (!user) window.location.href = "https://msprk.github.io/"; });

  const db     = getDatabase(app);
  const dbRef  = ref(db, "aktivity/zaznamy");

  // ── ACTIVITY TYPES ──
  const ACTIVITIES = [
    { id: "preverenie",   label: "Preverenie osoby",    icon: "🔍" },
    { id: "pomoc",        label: "Pomoc občanovi",       icon: "🤝" },
    { id: "telefon159",   label: "Telefonát 159",        icon: "📞" },
    { id: "predvedenie",  label: "Predvedenie osoby",    icon: "👮" },
    { id: "pokuta",       label: "Bloková pokuta",        icon: "📋" },
    { id: "priestupok",   label: "Priestupkové konanie", icon: "⚖️" },
    { id: "hliadkovanie", label: "Hliadkovanie",         icon: "🚶" },
    { id: "ine",          label: "Iné",                  icon: "📌" },
  ];
  const WORKERS = Array.from({length:39},(_,i)=>(i+1).toString().padStart(3,"0"));

  // ── STATE ──
  let allData = {};          // Firebase data
  let formWorkers = {};      // { "001": { preverenie:0, pomoc:0, ... } }
  let statPeriod = "week";
  let openZazId  = null;
  let statChart  = null;

  function setStatus(on) {
    document.getElementById("status-dot").className = "dot"+(on?" on":"");
    document.getElementById("status-text").textContent = on ? "Online" : "Offline";
  }

  function todayStr() { return new Date().toISOString().split("T")[0]; }
  function emptyWorkerCounts() { const o={}; ACTIVITIES.forEach(a=>o[a.id]=0); return o; }
  function workerTotal(counts) { return ACTIVITIES.reduce((s,a)=>s+(counts[a.id]||0),0); }
  function zazTotal(zaz) { return Object.values(zaz.workers||{}).reduce((s,w)=>s+workerTotal(w),0); }

  // Set today on load
  document.getElementById("f-date").value = todayStr();

  // Populate worker select
  const wSel = document.getElementById("worker-select");
  WORKERS.forEach(w => { const o=document.createElement("option"); o.value=w; o.textContent=w; wSel.appendChild(o); });

  // Firebase
  onValue(dbRef, snap => {
    allData = snap.val() || {};
    setStatus(true);
    window.renderZaznamy();
    window.renderStats();
  }, () => setStatus(false));

  // ── TAB SWITCH ──
  window.switchTab = function(tab) {
    ["zaznam","zaznamy","stats"].forEach(t => {
      document.getElementById("tab-"+t).classList.toggle("active", t===tab);
      document.getElementById("nav-"+t).classList.toggle("active", t===tab);
    });
    if (tab==="stats") window.renderStats();
    if (tab==="zaznamy") window.renderZaznamy();
  };

  // ── ADD WORKER TO FORM ──
  window.addWorker = function() {
    const sel = document.getElementById("worker-select");
    const w = sel.value;
    if (!w) { alert("Vyberte pracovníka."); return; }
    if (formWorkers[w]) { alert(`Pracovník ${w} je už pridaný.`); return; }
    formWorkers[w] = emptyWorkerCounts();
    sel.value = "";
    renderFormWorkers();
  };

  window.removeWorker = function(w) {
    delete formWorkers[w];
    renderFormWorkers();
  };

  window.inc = function(w, actId) {
    formWorkers[w][actId] = (formWorkers[w][actId]||0) + 1;
    renderFormWorkers();
  };

  window.dec = function(w, actId) {
    if ((formWorkers[w][actId]||0) <= 0) return;
    formWorkers[w][actId]--;
    renderFormWorkers();
  };

  function renderFormWorkers() {
    const el = document.getElementById("workers-list");
    const keys = Object.keys(formWorkers);
    if (!keys.length) {
      el.innerHTML = `<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:13px;background:var(--surface);border-radius:var(--radius-lg);border:.5px solid var(--border);margin-bottom:10px">Pridajte pracovníkov hliadky</div>`;
      return;
    }

    // Build matrix: activities as rows, workers as columns
    const workerCols = keys.map(w => `
      <th class="worker-th">
        <div class="worker-th-inner">
          <div class="worker-th-label">${w}</div>
          <button class="btn-remove-worker" onclick="removeWorker('${w}')">×</button>
        </div>
      </th>`).join("");

    const actRows = ACTIVITIES.map(a => {
      const cells = keys.map(w => {
        const cnt = formWorkers[w][a.id]||0;
        return `<td class="act-cell">
          <div class="cell-counter">
            <button class="btn-minus" onclick="dec('${w}','${a.id}')" ${cnt===0?"disabled":""}>−</button>
            <div class="act-num${cnt>0?" nz":""}">${cnt}</div>
            <button class="btn-plus" onclick="inc('${w}','${a.id}')">+</button>
          </div>
        </td>`;
      }).join("");
      return `<tr>
        <td><div class="act-name-td"><span class="act-icon">${a.icon}</span>${a.label}</div></td>
        ${cells}
      </tr>`;
    }).join("");

    const totalRow = `<tr style="background:var(--surface2)">
      <td><div class="act-name-td total-td">Celkom</div></td>
      ${keys.map(w=>`<td class="act-cell total-td">${workerTotal(formWorkers[w])}</td>`).join("")}
    </tr>`;

    el.innerHTML = `
      <div class="act-grid-wrap">
        <table class="act-grid">
          <thead><tr>
            <th class="act-name-th">Aktivita</th>
            ${workerCols}
          </tr></thead>
          <tbody>${actRows}</tbody>
          <tfoot>${totalRow}</tfoot>
        </table>
      </div>`;
  }

  // Init empty state
  renderFormWorkers();

  // ── SAVE ──
  window.saveZaznam = async function() {
    const date  = document.getElementById("f-date").value;
    const shift = document.getElementById("f-shift").value;
    if (!date)  { alert("Vyplňte dátum."); return; }
    if (!shift) { alert("Vyberte hliadku."); return; }
    if (!Object.keys(formWorkers).length) { alert("Pridajte aspoň jedného pracovníka."); return; }

    const btn = document.getElementById("save-btn");
    btn.disabled = true; btn.textContent = "Ukladanie...";

    await push(dbRef, { date, shift, ts: Date.now(), workers: formWorkers });

    // Reset form
    formWorkers = {};
    document.getElementById("f-date").value = todayStr();
    document.getElementById("f-shift").value = "";
    renderFormWorkers();
    btn.disabled = false; btn.textContent = "Uložiť záznam";
    switchTab("zaznamy");
  };

  // ── ZÁZNAMY ──
  window.renderZaznamy = function() {
    const fDate = document.getElementById("filter-date")?.value || "";
    const entries = Object.entries(allData)
      .map(([id,v])=>({id,...v}))
      .filter(z => !fDate || z.date === fDate)
      .sort((a,b)=>(b.date||"").localeCompare(a.date||"") || (b.ts||0)-(a.ts||0));

    const el = document.getElementById("zaznamy-list");
    if (!entries.length) {
      el.innerHTML = `<div class="empty">Žiadne záznamy${fDate?" pre vybraný dátum":""}.</div>`;
      return;
    }
    el.innerHTML = entries.map(z => {
      const total   = zazTotal(z);
      const wCount  = Object.keys(z.workers||{}).length;
      const isOpen  = openZazId === z.id;
      return `
      <div class="zaz-card">
        <div class="zaz-header" onclick="toggleZaz('${z.id}')">
          <div class="zaz-chip">${z.shift||"?"}</div>
          <div class="zaz-info">
            <div class="zaz-title">Hliadka ${z.shift||"?"} · ${z.date||""}</div>
            <div class="zaz-meta">${wCount} pracovník${wCount===1?"":"ov"} · ${total} aktivít</div>
          </div>
          <div class="zaz-total">${total}</div>
        </div>
        <div class="zaz-body${isOpen?" open":""}">
          ${Object.entries(z.workers||{}).sort((a,b)=>workerTotal(b[1])-workerTotal(a[1])).map(([w,counts])=>`
          <div class="zaz-worker-row">
            <div class="zaz-worker-name">Pracovník ${w} · <span style="color:var(--accent)">${workerTotal(counts)} aktivít</span></div>
            <div class="zaz-acts">
              ${ACTIVITIES.map(a=>{
                const v=counts[a.id]||0;
                return `<div class="zaz-act-item${v>0?" nz":""}">
                  <span>${a.icon}</span> ${a.label} <span>${v}</span>
                </div>`;
              }).join("")}
            </div>
          </div>`).join("")}
          <button class="del-btn" onclick="deleteZaz('${z.id}')">Vymazať záznam</button>
        </div>
      </div>`;
    }).join("");
  };

  window.toggleZaz = id => { openZazId = openZazId===id?null:id; window.renderZaznamy(); };
  window.deleteZaz = id => { if (confirm("Vymazať tento záznam?")) remove(ref(db,"aktivity/zaznamy/"+id)); };
  window.resetDate = () => { document.getElementById("filter-date").value=todayStr(); window.renderZaznamy(); };

  // ── ŠTATISTIKY ──
  window.setPeriod = function(p) {
    statPeriod = p;
    document.querySelectorAll(".period-btn").forEach(b=>b.classList.toggle("active",b.dataset.p===p));
    window.renderStats();
  };

  window.renderStats = function() {
    const now    = new Date();
    const cutoff = statPeriod==="week"  ? new Date(now-7*86400000).toISOString().split("T")[0]
                 : statPeriod==="month" ? new Date(now-30*86400000).toISOString().split("T")[0]
                 : "0000-00-00";

    const entries = Object.values(allData).filter(z=>(z.date||"")>=cutoff);

    // Totals
    const totalSessions = entries.length;
    const totalActs     = entries.reduce((s,z)=>s+zazTotal(z),0);
    const totalWorkers  = new Set(entries.flatMap(z=>Object.keys(z.workers||{}))).size;

    // Per-worker
    const workerMap = {};
    entries.forEach(z => Object.entries(z.workers||{}).forEach(([w,counts]) => {
      if (!workerMap[w]) workerMap[w] = { acts:0 };
      workerMap[w].acts += workerTotal(counts);
    }));
    const topWorkers = Object.entries(workerMap).sort((a,b)=>b[1].acts-a[1].acts).slice(0,10);
    const maxW = Math.max(...topWorkers.map(([,v])=>v.acts), 1);

    // Per-activity
    const actMap = {};
    ACTIVITIES.forEach(a=>actMap[a.id]=0);
    entries.forEach(z=>Object.values(z.workers||{}).forEach(counts=>ACTIVITIES.forEach(a=>actMap[a.id]+=(counts[a.id]||0))));
    const maxA = Math.max(...Object.values(actMap), 1);

    // Per-shift
    const shiftColors = {"A":"#1d5fa8","B":"#2d6a4f","C":"#b45309","D":"#c0392b"};
    const shiftData   = ["A","B","C","D"].map(sh=>({
      sh,
      acts: entries.filter(z=>z.shift===sh).reduce((s,z)=>s+zazTotal(z),0),
      sess: entries.filter(z=>z.shift===sh).length
    }));
    const maxSh = Math.max(...shiftData.map(d=>d.acts), 1);

    const el = document.getElementById("stats-content");
    if (!el) return;
    el.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-num">${totalActs}</div><div class="kpi-label">Aktivít celkom</div></div>
        <div class="kpi-card"><div class="kpi-num">${totalSessions}</div><div class="kpi-label">Záznamy</div></div>
        <div class="kpi-card"><div class="kpi-num">${totalWorkers}</div><div class="kpi-label">Pracovníci</div></div>
      </div>

      ${totalSessions===0 ? `<div class="empty">Žiadne dáta za vybrané obdobie.</div>` : `
      <div class="stat-card">
        <div class="stat-card-title">Podľa pracovníka</div>
        ${topWorkers.map(([w,v])=>`
          <div class="br">
            <div class="br-label">${w}</div>
            <div class="br-wrap"><div class="br-bar" style="width:${Math.round(v.acts/maxW*100)}%;background:var(--accent)"></div></div>
            <div class="br-count"><span style="font-weight:700;color:var(--accent)">${v.acts}</span> <span style="font-size:11px;color:var(--muted)">aktiv.</span></div>
          </div>`).join("")}
      </div>

      <div class="stat-card">
        <div class="stat-card-title">Podľa hliadky</div>
        ${shiftData.map(({sh,acts,sess})=>`
          <div class="br">
            <div class="br-label">Hliadka ${sh}</div>
            <div class="br-wrap"><div class="br-bar" style="width:${Math.round(acts/maxSh*100)}%;background:${shiftColors[sh]}"></div></div>
            <div class="br-count">
              <span style="font-weight:700">${acts}</span> <span style="font-size:11px;color:var(--muted)">aktiv.</span>
              &nbsp;·&nbsp; <span style="font-size:11px;color:var(--muted)">${sess} záz.</span>
            </div>
          </div>`).join("")}
      </div>

      <div class="stat-card">
        <div class="stat-card-title">Podľa typu aktivity</div>
        <div class="chart-wrap"><canvas id="act-chart"></canvas></div>
      </div>

      <div class="stat-card">
        <div class="stat-card-title">Typy aktivít — detail</div>
        ${ACTIVITIES.map(a=>`
          <div class="br">
            <div class="br-label" style="min-width:160px;font-size:12px">${a.icon} ${a.label}</div>
            <div class="br-wrap"><div class="br-bar" style="width:${Math.round(actMap[a.id]/maxA*100)}%;background:var(--accent)"></div></div>
            <div class="br-count" style="font-weight:700;color:var(--accent)">${actMap[a.id]}</div>
          </div>`).join("")}
      </div>`}
    `;

    if (totalSessions > 0) {
      if (statChart) { statChart.destroy(); statChart = null; }
      const ctx = document.getElementById("act-chart");
      if (ctx) {
        statChart = new Chart(ctx, {
          type: "bar",
          data: {
            labels: ACTIVITIES.map(a=>a.label),
            datasets: [{ data: ACTIVITIES.map(a=>actMap[a.id]), backgroundColor:"rgba(29,95,168,0.18)", borderColor:"rgba(29,95,168,0.7)", borderWidth:1.5, borderRadius:6 }]
          },
          options: {
            responsive:true, maintainAspectRatio:true,
            plugins:{ legend:{display:false} },
            scales:{
              x:{ grid:{display:false}, ticks:{font:{family:"DM Sans",size:10},color:"#7a746a",maxRotation:35} },
              y:{ grid:{color:"rgba(0,0,0,0.05)"}, ticks:{font:{family:"DM Sans",size:11},color:"#7a746a",precision:0}, beginAtZero:true }
            }
          }
        });
      }
    }
  };
</script>
</body>
</html>
